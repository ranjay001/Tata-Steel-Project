<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-GatePass Login — Tata Steel Jamshedpur</title>
    <link rel="stylesheet" href="vgp-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo-icon">🛡️</div>
            <h1>E-GatePass</h1>
            <span>TATA STEEL · JAMSHEDPUR</span>
        </div>
        
        <div class="auth-card">
            <h2>Operator Login</h2>
            <p>Sign in to the gate desk</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="userId">User ID</label>
                    <input type="text" id="userId" placeholder="e.g. gateop1" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">Login</button>
            </form>
            
            <div class="auth-switch-link">
                Don't have an account? <a href="vgp-register.html">Create New Account</a>
            </div>
        </div>
        
        <div class="auth-footer-tagline">
            We also make tomorrow
        </div>
    </div>
    
    <script type="module" src="vgp-login.js"></script>
</body>
</html>
